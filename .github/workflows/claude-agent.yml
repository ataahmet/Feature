name: Claude AI Agent

on:
  pull_request:
    types: [ opened, synchronize ]
  issue_comment:
    types: [ created ]
  workflow_dispatch:
    inputs:
      task:
        description: '🤖 Claude için görev (örn: Login ekranına beni hatırla ekle)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:

  # ──────────────────────────────────────────────
  # YENİ JOB: Terminalden / GitHub UI'dan PR aç
  # ──────────────────────────────────────────────
  create-pr-from-prompt:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Git
        run: |
          git config --global user.name "Claude AI"
          git config --global user.email "claude-ai@noreply.github.com"

      - name: Create branch and run Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASK: ${{ github.event.inputs.task }}
        run: |
          BRANCH_NAME="feature/claude-$(date +%Y%m%d-%H%M%S)"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

          git checkout -b "$BRANCH_NAME"

          CLAUDE_MD=""
          if [ -f "CLAUDE.md" ]; then
            CLAUDE_MD=$(cat CLAUDE.md)
          fi

          claude --dangerously-skip-permissions \
            --output-format stream-json \
            --verbose \
            --max-turns 30 \
            -p "
          Sen bir Android Kotlin uzman geliştiricisin.
          Aşağıdaki proje kurallarına kesinlikle uy:

          $CLAUDE_MD

          GÖREV:
          $TASK

          TALİMATLAR:
          - Kotlin ile yaz
          - MVI mimarisine uy
          - DataBinding kullan, findViewById kullanma
          - Hilt ile dependency injection yap
          - Null safety ihlali olmasın
          - Memory leak bırakma
          - Gerekli dosyaları oluştur veya düzenle
          - Sadece gorevi yap, aciklama yazma
          " || true

      - name: Commit changes
        env:
          TASK: ${{ github.event.inputs.task }}
        run: |
          git add -A

          if git diff --staged --quiet; then
            echo "⚠️ Claude hiçbir değişiklik yapmadı."
            exit 1
          fi

          TASK_SHORT=$(echo "$TASK" | cut -c1-72)
          git commit -m "feat: $TASK_SHORT

          🤖 Claude Agent tarafından otomatik oluşturuldu."

      - name: Push branch
        run: |
          git push origin "$BRANCH_NAME"
          echo "Pushed branch: $BRANCH_NAME"

      - name: Open Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASK: ${{ github.event.inputs.task }}
        run: |
          git fetch origin
          gh pr create \
            --title "🤖 feat: $TASK" \
            --head "$BRANCH_NAME" \
            --body "## 🤖 Claude Agent PR

          ### 📋 Görev
          $TASK

          ### 🏗️ Teknik Detaylar
          | Başlık | Değer |
          |--------|-------|
          | Mimari | MVI |
          | DI | Hilt |
          | UI Binding | DataBinding |
          | Dil | Kotlin |

          ### ✅ Review Kontrol Listesi
          - [ ] Kod review yapıldı
          - [ ] Cihazda test edildi
          - [ ] Memory leak kontrolü yapıldı
          - [ ] Null safety kontrol edildi
          - [ ] Rx thread kullanımı kontrol edildi

          ---
          > ⚠️ Bu PR Claude Agent tarafından otomatik oluşturulmuştur.
          > Merge etmeden önce mutlaka review edin." \
            --base master

  # ──────────────────────────────────────────────
  # MEVCUT JOB: PR açıldığında review + fix
  # ──────────────────────────────────────────────
  claude-agent:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'issue_comment'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Git
        run: |
          git config --global user.name "Claude AI"
          git config --global user.email "claude-ai@noreply.github.com"

      - name: Create Python Parser Script
        run: |
          cat > /tmp/extract_kotlin.py << 'PYEOF'
          import re
          import sys

          with open(sys.argv[1], 'r') as f:
              content = f.read()

          match = re.search(r'```(?:kotlin)?\n(.*?)```', content, re.DOTALL)
          if match:
              with open(sys.argv[2], 'w') as f:
                  f.write(match.group(1))
          else:
              with open(sys.argv[2], 'w') as f:
                  f.write(content)
          PYEOF

      - name: Auto Code Review
        if: github.event_name == 'pull_request'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          SAFE_BASE=$(echo "$BASE_BRANCH" | tr -cd '[:alnum:]/_.-')
          git fetch origin "$SAFE_BASE" 2>/dev/null || true

          SAFE_FILES=$(git diff --name-only "origin/${SAFE_BASE}...HEAD" 2>/dev/null | tr '\n' ' ' | tr -cd '[:alnum:]/._: -')
          DIFF_CONTENT=$(git diff "origin/${SAFE_BASE}...HEAD" -- '*.kt' '*.java' 2>/dev/null | head -c 8000 || true)

          REVIEW_PROMPT="Sen bir Android Kotlin uzmanisın. PR #${PR_NUMBER} inceliyorsun.
          Degisen dosyalar: ${SAFE_FILES}

          Sunları incele ve Turkce maddeler halinde yorum yap:
          - Null safety ihlalleri
          - Crash riski tasıyan satirlar
          - Performans sorunları
          - Kotlin best practice ihlalleri
          - Edge caseler"

          claude --dangerously-skip-permissions \
            -p "$REVIEW_PROMPT" > /tmp/review_result.txt 2>/dev/null || {
            echo "Claude API failed for review, skipping."
            exit 0
          }

          gh pr comment "$PR_NUMBER" --body-file /tmp/review_result.txt || true

      - name: Auto Fix Bugs
        if: github.event_name == 'pull_request'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          SAFE_BASE=$(echo "$BASE_BRANCH" | tr -cd '[:alnum:]/_.-')
          git fetch origin "$SAFE_BASE" 2>/dev/null || true

          CHANGED_FILES=$(git diff --name-only "origin/${SAFE_BASE}...HEAD" -- '*.kt' '*.java' 2>/dev/null || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No Kotlin/Java files changed."
            exit 0
          fi

          > /tmp/fixed_files.txt

          for FILE in $CHANGED_FILES; do
            [ -f "$FILE" ] || continue

            echo "Fix any bugs in this Kotlin file. Return ONLY the corrected code inside a kotlin code block, nothing else." > /tmp/prompt.txt
            echo "" >> /tmp/prompt.txt
            cat "$FILE" >> /tmp/prompt.txt

            claude --dangerously-skip-permissions \
              -p "$(cat /tmp/prompt.txt)" > "${FILE}.raw" 2>/dev/null || {
              echo "Claude failed for $FILE, skipping."
              continue
            }

            python3 /tmp/extract_kotlin.py "${FILE}.raw" "${FILE}.fixed"

            if [ -s "${FILE}.fixed" ] && ! diff -q "$FILE" "${FILE}.fixed" > /dev/null 2>&1; then
              mv "${FILE}.fixed" "$FILE"
              echo "$FILE" >> /tmp/fixed_files.txt
              echo "Fixed: $FILE"
            else
              echo "No changes: $FILE"
            fi

            rm -f "${FILE}.raw" "${FILE}.fixed" /tmp/prompt.txt
          done

          git add -A

          if git diff --staged --quiet; then
            echo "No fixes to commit."
            exit 0
          fi

          git commit -m "🤖 Claude: Potential bugs fixed automatically"
          git push origin HEAD:"$HEAD_BRANCH"

      - name: Comment Fix Summary
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ ! -s /tmp/fixed_files.txt ]; then
            echo "No fixes, skipping comment."
            exit 0
          fi

          sed 's/^/- /' /tmp/fixed_files.txt > /tmp/fixed_list.txt
          printf '🤖 **Claude otomatik duzeltme yapti:**\n\n%s\n\nLutfen degisiklikleri review edin.' \
            "$(cat /tmp/fixed_list.txt)" > /tmp/fix_comment.txt
          gh pr comment "$PR_NUMBER" --body-file /tmp/fix_comment.txt || true

      - name: On-demand Review
        if: |
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          contains(github.event.comment.body, '/review')
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          BASE_BRANCH=$(gh pr view "$PR_NUMBER" --json baseRefName -q .baseRefName)
          SAFE_BASE=$(echo "$BASE_BRANCH" | tr -cd '[:alnum:]/_.-')
          git fetch origin "$SAFE_BASE"

          claude --dangerously-skip-permissions \
            -p "Sen bir Android Kotlin uzmanısın. PR #${PR_NUMBER} icin manuel review istegi geldi. Detaylı Turkce kod incelemesi yap." \
            > /tmp/ondemand_review.txt 2>/dev/null || { echo "Claude failed"; exit 0; }

          gh pr comment "$PR_NUMBER" --body-file /tmp/ondemand_review.txt || true
