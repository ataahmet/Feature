name: Claude AI Agent

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # PR açıldığında/güncellendiğinde otomatik code review
      - name: Auto Code Review
        if: github.event_name == 'pull_request'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Sen bir Android Kotlin uzmanısın. Bu PR'ı Türkçe olarak incele.

            Lütfen şunları değerlendir:
            1. Kod kalitesi ve okunabilirlik
            2. Potansiyel bug'lar ve edge case'ler
            3. Kotlin best practice uyumu
            4. Performans ve bellek yönetimi
            5. Android lifecycle ve coroutine kullanımı

            PR değişikliklerini `git diff` ile inceleyip detaylı geri bildirim ver.
            Bulguları PR'a yorum olarak ekle.
          claude_args: |
            --max-turns 5
            --model claude-sonnet-4-6

      # @claude mention ile interaktif kullanım (PR/issue yorumlarında)
      - name: Claude Interactive Assistant
        if: |
          (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
          (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --max-turns 10
            --model claude-sonnet-4-6