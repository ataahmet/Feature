name: Claude AI Agent

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      task:
        description: '🤖 Claude için görev'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:

  create-pr-from-prompt:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Git
        run: |
          git config --global user.name "Claude AI"
          git config --global user.email "claude-ai@noreply.github.com"

      - name: Create branch and run Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASK: ${{ github.event.inputs.task }}
        run: |
          BRANCH_NAME="feature/claude-$(date +%Y%m%d-%H%M%S)"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          git checkout -b "$BRANCH_NAME"

          CLAUDE_MD=""
          [ -f "CLAUDE.md" ] && CLAUDE_MD=$(cat CLAUDE.md)

          claude --dangerously-skip-permissions \
            --output-format stream-json \
            --verbose \
            --max-turns 30 \
            -p "Sen bir Android Kotlin uzman geliştiricisin.
          Proje kuralları:
          $CLAUDE_MD

          GÖREV: $TASK

          TALİMATLAR:
          - Kotlin ile yaz, MVI mimarisine uy
          - DataBinding kullan, findViewById kullanma
          - Hilt ile dependency injection yap
          - Null safety ihlali olmasın, memory leak bırakma
          - Sadece görevi yap, açıklama yazma" || true

      - name: Commit and push
        env:
          TASK: ${{ github.event.inputs.task }}
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "⚠️ Claude hiçbir değişiklik yapmadı."
            exit 1
          fi
          TASK_SHORT=$(echo "$TASK" | cut -c1-72)
          git commit -m "feat: $TASK_SHORT

          🤖 Claude Agent tarafından otomatik oluşturuldu."
          git push origin "$BRANCH_NAME"

      - name: Open Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TASK: ${{ github.event.inputs.task }}
        run: |
          gh pr create \
            --title "🤖 feat: $TASK" \
            --head "$BRANCH_NAME" \
            --body "## 🤖 Claude Agent PR

          ### 📋 Görev
          $TASK

          ### 🏗️ Teknik Detaylar
          | Başlık | Değer |
          |--------|-------|
          | Mimari | MVI |
          | DI | Hilt |
          | UI Binding | DataBinding |
          | Dil | Kotlin |

          ### ✅ Review Kontrol Listesi
          - [ ] Kod review yapıldı
          - [ ] Cihazda test edildi
          - [ ] Memory leak kontrolü yapıldı
          - [ ] Null safety kontrol edildi

          ---
          > ⚠️ Bu PR Claude Agent tarafından otomatik oluşturulmuştur." \
            --base master

  claude-agent:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'issue_comment'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Git
        run: |
          git config --global user.name "Claude AI"
          git config --global user.email "claude-ai@noreply.github.com"

      # ✅ Düzeltme: Python indentation sorunu giderildi
      - name: Create Python Parser Script
        run: |
          cat > /tmp/extract_kotlin.py << 'PYEOF'
import re
import sys

with open(sys.argv[1], 'r') as f:
    content = f.read()

match = re.search(r'```(?:kotlin)?\n(.*?)```', content, re.DOTALL)
if match:
    with open(sys.argv[2], 'w') as f:
        f.write(match.group(1))
else:
    with open(sys.argv[2], 'w') as f:
        f.write(content)
PYEOF

      - name: Auto Code Review
        if: github.event_name == 'pull_request'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          SAFE_BASE=$(echo "$BASE_BRANCH" | tr -cd '[:alnum:]/_.-')
          git fetch origin "$SAFE_BASE" 2>/dev/null || true

          SAFE_FILES=$(git diff --name-only origin/"$SAFE_BASE"...HEAD | tr '\n' ' ')
          # ✅ Düzeltme: glob quote içinde
          DIFF_CONTENT=$(git diff origin/"$SAFE_BASE"...HEAD -- '*.kt' '*.java' 2>/dev/null | head -c 8000)

          if [ -z "$DIFF_CONTENT" ]; then
            echo "No Kotlin/Java changes found, skipping review."
            exit 0
          fi

          # ✅ Düzeltme: prompt dosyaya yaz
          cat > /tmp/review_prompt.txt << PROMPT
Sen bir Android Kotlin uzmanısın. PR #${PR_NUMBER} inceliyorsun.
Değişen dosyalar: ${SAFE_FILES}
Kod:
${DIFF_CONTENT}

Şunları incele ve Türkçe maddeler halinde yorum yap:
- Null safety ihlalleri
- Crash riski taşıyan satırlar
- Performans sorunları
- Kotlin best practice ihlalleri
- Edge case'ler
PROMPT

          # ✅ Düzeltme: çıktıyı dosyaya al, sonra yorum yap
          claude -p "$(cat /tmp/review_prompt.txt)" > /tmp/review_output.txt 2>&1 || true

          if [ -s /tmp/review_output.txt ]; then
            gh pr comment "$PR_NUMBER" --body-file /tmp/review_output.txt
          else
            echo "Claude review output boş, yorum yapılmadı."
          fi

      - name: Auto Fix Bugs
        if: github.event_name == 'pull_request'
        env:
          ANTH
