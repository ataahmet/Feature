name: Claude AI Agent

on:
  pull_request:
    types: [ opened, synchronize ]
  issue_comment:
    types: [ created ]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Git
        run: |
          git config --global user.name "Claude AI"
          git config --global user.email "claude-ai@noreply.github.com"

      - name: Auto Code Review
        if: github.event_name == 'pull_request'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          SAFE_BASE=$(echo "$BASE_BRANCH" | tr -cd '[:alnum:]/_.-')
          SAFE_FILES=$(git diff --name-only origin/"$SAFE_BASE"...HEAD | tr '\n' ' ' | tr -cd '[:alnum:]/._: -')
          DIFF_CONTENT=$(git diff origin/"$SAFE_BASE"...HEAD -- *.kt *.java 2>/dev/null | head -c 8000)

          PROMPT="Sen bir Android Kotlin uzmanısın. PR #${PR_NUMBER} inceliyorsun.
          Değişen dosyalar: ${SAFE_FILES}
          Kod: ${DIFF_CONTENT}
          
          Şunları incele ve Türkçe maddeler halinde yorum yap:
          - Null safety ihlalleri
          - Crash riski taşıyan satırlar
          - Performans sorunları
          - Kotlin best practice ihlalleri
          - Edge case'ler"

          echo "$PROMPT" | claude -p - | gh pr comment "$PR_NUMBER" --body-file -

      - name: Auto Fix Bugs
        if: github.event_name == 'pull_request'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          SAFE_BASE=$(echo "$BASE_BRANCH" | tr -cd '[:alnum:]/_.-')
          CHANGED_FILES=$(git diff --name-only origin/"$SAFE_BASE"...HEAD -- *.kt *.java 2>/dev/null)

          for FILE in $CHANGED_FILES; do
            if [ -f "$FILE" ]; then

              # 1. Claude'a sıkı prompt gönder
              claude -p "Sen bir Android Kotlin uzmanısın.
              Aşağıdaki dosyadaki hataları düzelt.

              ÇIKTI KURALLARI (ZORUNLU):
              - SADECE Kotlin kodu yaz
              - İlk karakter package veya import olmalı
              - Hiçbir açıklama, markdown, \`\`\` işareti YAZMA
              - Dosyanın tamamını yaz, eksik bırakma

              $(cat "$FILE")" > "${FILE}.raw"

              # 2. Markdown artıklarını temizle
              sed '/^```/d' "${FILE}.raw" > "${FILE}.step1"

              # 3. İlk geçerli Kotlin satırından itibaren al
              sed -n '/^\(package\|import\|\/\*\|\/\/\|@\|class\|fun\|object\|interface\|enum\|sealed\|data\)/,$p' \
                "${FILE}.step1" > "${FILE}.fixed"

              # 4. Değişiklik olduysa uygula
              if [ -s "${FILE}.fixed" ] && ! diff -q "$FILE" "${FILE}.fixed" > /dev/null 2>&1; then
                mv "${FILE}.fixed" "$FILE"
                echo "✅ Fixed: $FILE"
              else
                echo "⏭️ No changes: $FILE"
              fi

              # 5. Temp dosyaları temizle
              rm -f "${FILE}.raw" "${FILE}.step1" "${FILE}.fixed"
            fi
          done

          git add -A

          if git diff --staged --quiet; then
            echo "No fixes to commit."
            exit 0
          fi

          git commit -m "🤖 Claude: Potential bugs fixed automatically"
          git push origin HEAD:"$HEAD_BRANCH"

      - name: Comment Fix Summary
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          SAFE_BASE=$(echo "$BASE_BRANCH" | tr -cd '[:alnum:]/_.-')
          FIXED_FILES=$(git diff --name-only origin/"$SAFE_BASE"...HEAD)

          if [ -n "$FIXED_FILES" ]; then
            COMMENT="🤖 **Claude otomatik düzeltme yaptı:**

          $(echo "$FIXED_FILES" | sed 's/^/- /')

          Lütfen değişiklikleri review edin."
            echo "$COMMENT" | gh pr comment "$PR_NUMBER" --body-file -
          fi

      - name: On-demand Review
        if: |
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != null &&
          contains(github.event.comment.body, '/review')
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          BASE_BRANCH=$(gh pr view "$PR_NUMBER" --json baseRefName -q .baseRefName)
          SAFE_BASE=$(echo "$BASE_BRANCH" | tr -cd '[:alnum:]/_.-')
          git fetch origin "$SAFE_BASE"

          DIFF_CONTENT=$(git diff origin/"$SAFE_BASE"...HEAD -- *.kt *.java 2>/dev/null | head -c 8000)

          PROMPT="Sen bir Android Kotlin uzmanısın. PR #${PR_NUMBER} için manuel review isteği geldi.
          Kod: ${DIFF_CONTENT}
          Detaylı Türkçe kod incelemesi yap."

          echo "$PROMPT" | claude -p - | gh pr comment "$PR_NUMBER" --body-file -